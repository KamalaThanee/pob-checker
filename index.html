<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>POB Checker Pro - Kamala Thanee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <div class="max-w-4xl mx-auto space-y-4">
        <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl text-center">
            <h1 class="text-3xl font-black text-blue-400">🚢 POB MUSTER CHECKER</h1>
            <p class="text-slate-400">ระบบตรวจเช็กรายชื่อจากบอร์ดด้วย AI (Gemini 2.0 Flash)</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="p-4 bg-slate-800 rounded-2xl border border-slate-700">
                <label class="block mb-2 font-bold text-blue-300">1. เลือกไฟล์ Excel (Sheet: POB)</label>
                <input type="file" id="excelFile" accept=".xlsx" class="w-full text-sm">
            </div>
            <div class="p-4 bg-slate-800 rounded-2xl border border-slate-700">
                <label class="block mb-2 font-bold text-green-300">2. ถ่ายรูปบอร์ด (หลายรูปได้)</label>
                <input type="file" id="imageFiles" accept="image/*" multiple class="w-full text-sm">
            </div>
        </div>

        <button onclick="runChecker()" id="btnAction" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-xl shadow-lg transition-all">เริ่มการตรวจสอบ</button>

        <div id="stats" class="hidden grid grid-cols-3 gap-4 font-bold">
            <div class="bg-slate-800 p-4 rounded-2xl border-b-4 border-blue-500 text-center">
                <div class="text-xs text-slate-400">CREW</div>
                <div id="stat-crew" class="text-2xl">0/0</div>
            </div>
            <div class="bg-slate-800 p-4 rounded-2xl border-b-4 border-purple-500 text-center">
                <div class="text-xs text-slate-400">CATERING</div>
                <div id="stat-cat" class="text-2xl">0/0</div>
            </div>
            <div class="bg-slate-800 p-4 rounded-2xl border-b-4 border-orange-500 text-center">
                <div class="text-xs text-slate-400">PASSENGER</div>
                <div id="stat-pax" class="text-2xl">0/0</div>
            </div>
        </div>

        <div id="debugLog" class="p-3 bg-black/30 rounded-xl text-[10px] font-mono text-slate-500 max-h-24 overflow-y-auto hidden"></div>

        <div id="results" class="space-y-2"></div>
    </div>

    <script>
        let masterList = { crew: [], catering: [], passenger: [] };
        let ocrResults = [];

        // Logic 1: อ่าน Excel และใช้คำว่า SUMMARY เป็นจุดตัดจบ
        document.getElementById('excelFile').onchange = async (e) => {
            const data = await e.target.files[0].arrayBuffer();
            const workbook = XLSX.read(data);
            const sheet = workbook.Sheets['POB'];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            masterList = { crew: [], catering: [], passenger: [] };
            let section = "";
            let stopSignal = false;

            rows.forEach(row => {
                if (stopSignal) return;

                const colA = String(row[0] || ""); // No.
                const colB = String(row[1] || "").trim().replace("-", ""); // Room
                const colC = String(row[2] || "").trim(); // Bed
                const colD = String(row[3] || "").trim().toUpperCase(); // Name

                // สัญญาณหยุด (Stop Signal)
                if (colD.includes("SUMMARY") || colA.toUpperCase().includes("SUMMARY")) {
                    stopSignal = true;
                    return;
                }

                // เปลี่ยน Section
                if (colD.includes("BARGE CREW")) section = "crew";
                if (colD.includes("CATERING")) section = "catering";
                if (colD.includes("PASSENGER") || colD.includes("OPERATION")) section = "passenger";

                // เงื่อนไขการนับคน (ต้องมี No. เป็นตัวเลข และมีเลขห้อง)
                if (section && !isNaN(parseInt(colA)) && colB) {
                    masterList[section].push({
                        key: (colB + colC).toUpperCase().replace(/\s/g, ""), // เช่น 422A
                        name: colD,
                        found: false
                    });
                }
            });
            alert(`Excel OK! พบรายชื่อทั้งหมด ${masterList.crew.length + masterList.catering.length + masterList.passenger.length} คน`);
        };

        // Logic 2: รัน AI สแกนรูปทีละรูปป้องกันค้าง
        async function runChecker() {
            const imgs = document.getElementById('imageFiles').files;
            if (imgs.length === 0) return alert("กรุณาเลือกรูปบอร์ด");

            const btn = document.getElementById('btnAction');
            const log = document.getElementById('debugLog');
            btn.disabled = true;
            log.classList.remove('hidden');
            ocrResults = [];

            for (let i = 0; i < imgs.length; i++) {
                btn.innerText = `⏳ AI กำลังสแกนรูปที่ ${i + 1}/${imgs.length}...`;
                const fd = new FormData();
                fd.append('files', imgs[i]);

                try {
                    const res = await fetch('/api/read-image', { method: 'POST', body: fd });
                    const lines = await res.json();
                    ocrResults = ocrResults.concat(lines);
                    log.innerHTML += `<div>[IMG ${i+1}] อ่านได้ ${lines.length} บรรทัด</div>`;
                } catch (ex) { console.error(ex); }
            }

            matchAndRender();
            btn.disabled = false;
            btn.innerText = "เริ่มการตรวจสอบ";
        }

        // Logic 3: เปรียบเทียบข้อมูล (The Matching Engine)
        function matchAndRender() {
            let totalFound = 0;
            
            Object.keys(masterList).forEach(sec => {
                masterList[sec].forEach(p => {
                    p.found = false;
                    // เช็กว่า Key (422A) หรือ ชื่อ มีอยู่ในสิ่งที่ AI อ่านได้ไหม
                    ocrResults.forEach(ocrLine => {
                        if (ocrLine.includes(p.key) || (ocrLine.includes(p.name.substring(0, 6)) && ocrLine.length > 5)) {
                            p.found = true;
                        }
                    });
                    if (p.found) totalFound++;
                });
            });

            // แสดงผล UI
            document.getElementById('stats').classList.remove('hidden');
            document.getElementById('stat-crew').innerText = `${masterList.crew.filter(x=>x.found).length}/${masterList.crew.length}`;
            document.getElementById('stat-cat').innerText = `${masterList.catering.filter(x=>x.found).length}/${masterList.catering.length}`;
            document.getElementById('stat-pax').innerText = `${masterList.passenger.filter(x=>x.found).length}/${masterList.passenger.length}`;

            let html = "";
            Object.keys(masterList).forEach(sec => {
                html += `<div class="text-xs font-bold text-slate-500 mt-4 uppercase">${sec}</div>`;
                masterList[sec].forEach(p => {
                    html += `
                        <div class="flex justify-between p-3 rounded-xl border ${p.found ? 'bg-green-500/10 border-green-500/30' : 'bg-red-500/10 border-red-500/30'}">
                            <span class="text-sm"><b>${p.key}</b> ${p.name}</span>
                            <span>${p.found ? '✅' : '❌'}</span>
                        </div>
                    `;
                });
            });
            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
