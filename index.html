<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POB Checker - Kamala Thanee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4">
    <div class="max-w-3xl mx-auto space-y-6">
        
        <header class="text-center p-8 bg-slate-800 rounded-3xl border border-slate-700 shadow-2xl">
            <h1 class="text-4xl font-black text-blue-400 tracking-tight">🚢 POB CHECKER</h1>
            <p class="text-slate-400 mt-2">Kamala Thanee | Total POB: 180 Persons</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="p-6 bg-slate-800 rounded-2xl border border-slate-700">
                <label class="block text-sm font-bold mb-3 text-blue-300 uppercase tracking-wider">1. ไฟล์รายชื่อ (Excel)</label>
                <input type="file" id="excelInput" accept=".xlsx" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
                <div id="excelInfo" class="mt-3 text-xs text-slate-500">ยังไม่มีข้อมูล...</div>
            </div>
            <div class="p-6 bg-slate-800 rounded-2xl border border-slate-700">
                <label class="block text-sm font-bold mb-3 text-green-300 uppercase tracking-wider">2. รูปบอร์ด Muster</label>
                <input type="file" id="imageInput" accept="image/*" multiple class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-green-600 file:text-white hover:file:bg-green-700 cursor-pointer">
                <div id="imageInfo" class="mt-3 text-xs text-slate-500">เลือกได้หลายรูปพร้อมกัน</div>
            </div>
        </div>

        <button onclick="processAll()" id="mainBtn" class="w-full py-5 bg-blue-500 hover:bg-blue-400 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-95 disabled:bg-slate-700 disabled:text-slate-500">
            เริ่มการตรวจเช็ก
        </button>

        <div id="statusAlert" class="hidden p-4 rounded-2xl text-center font-bold text-sm"></div>

        <div id="dashboard" class="hidden grid grid-cols-1 md:grid-cols-3 gap-4 font-bold text-center">
            <div class="bg-slate-800 p-5 rounded-2xl border-b-4 border-blue-500 shadow-md">
                <div class="text-xs text-slate-400 mb-1">BARGE CREW</div>
                <div id="count-crew" class="text-3xl text-blue-400">0 / 0</div>
            </div>
            <div class="bg-slate-800 p-5 rounded-2xl border-b-4 border-purple-500 shadow-md">
                <div class="text-xs text-slate-400 mb-1">CATERING</div>
                <div id="count-catering" class="text-3xl text-purple-400">0 / 0</div>
            </div>
            <div class="bg-slate-800 p-5 rounded-2xl border-b-4 border-orange-500 shadow-md">
                <div class="text-xs text-slate-400 mb-1">PASSENGER</div>
                <div id="count-passenger" class="text-3xl text-orange-400">0 / 0</div>
            </div>
        </div>

        <div id="resultContainer" class="bg-slate-800/50 rounded-2xl overflow-hidden border border-slate-700 shadow-xl hidden">
            <div class="bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center">
                <span class="font-bold text-sm">รายละเอียดรายชื่อ</span>
                <span id="totalSummary" class="text-xs text-slate-400"></span>
            </div>
            <div id="resultList" class="p-2 space-y-1 max-h-[600px] overflow-y-auto"></div>
        </div>
    </div>

    <script>
        let pobData = { crew: [], catering: [], passenger: [] };
        let rawOcrLines = [];

        // 1. อ่าน Excel พร้อม Logic จุดตัดจบ (Stop Signal)
        document.getElementById('excelInput').onchange = async (e) => {
            const file = e.target.files[0];
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data);
            const sheet = workbook.Sheets['POB'];
            if(!sheet) return alert("ไม่พบ Sheet ชื่อ 'POB'");

            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            pobData = { crew: [], catering: [], passenger: [] };
            let currentSection = "";
            let stopReading = false;

            rows.forEach(row => {
                if(stopReading) return;

                const colA = String(row[0] || "").trim(); // No.
                const colB = String(row[1] || "").trim(); // Cabin
                const colC = String(row[2] || "").trim(); // Bed
                const colD = String(row[3] || "").trim().toUpperCase(); // Name

                // เช็กคำว่า SUMMARY เพื่อหยุดนับ (Stop Signal)
                if(colD.includes("SUMMARY") || colA.toUpperCase().includes("SUMMARY")) {
                    stopReading = true;
                    return;
                }

                // แยก Section
                if(colD.includes("BARGE CREW") && isNaN(parseInt(colA))) { currentSection = "crew"; return; }
                if(colD.includes("CATERING") && isNaN(parseInt(colA))) { currentSection = "catering"; return; }
                if((colD.includes("PASSENGER") || colD.includes("OPERATION")) && isNaN(parseInt(colA))) { 
                    currentSection = "passenger"; return; 
                }

                // กรองเฉพาะแถวที่มีข้อมูลครบ (No. เป็นตัวเลข + มีเลขห้อง + มีชื่อ)
                const isRealPerson = !isNaN(parseInt(colA)) && colB && colD && colD !== "NAME";
                
                if(currentSection && isRealPerson) {
                    pobData[currentSection].push({
                        fullId: (colB + colC).replace(/\s/g, "").toUpperCase(), // เช่น 422A
                        roomOnly: colB.toUpperCase(),
                        name: colD,
                        present: false,
                        confidence: 0
                    });
                }
            });

            const totalCount = pobData.crew.length + pobData.catering.length + pobData.passenger.length;
            document.getElementById('excelInfo').innerText = `✅ พบรายชื่อทั้งหมด ${totalCount} คน`;
            alert(`โหลดสำเร็จ! นับได้ ${totalCount} คน (Crew: ${pobData.crew.length}, Cat: ${pobData.catering.length}, Pax: ${pobData.passenger.length})`);
        };

        // 2. เรียกใช้ AI แบบวนลูปทีละรูป (Anti-Freeze)
        async function processAll() {
            const imgFiles = document.getElementById('imageInput').files;
            if(imgFiles.length === 0 || (pobData.crew.length + pobData.passenger.length === 0)) {
                return alert("กรุณาเลือกไฟล์ Excel และรูปภาพให้ครบ");
            }

            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            rawOcrLines = [];

            for(let i = 0; i < imgFiles.length; i++) {
                btn.innerText = `⏳ กำลังอ่านรูปที่ ${i+1} / ${imgFiles.length}...`;
                
                const fd = new FormData();
                fd.append('files', imgFiles[i]);

                try {
                    const res = await fetch('/api/read-image', { method: 'POST', body: fd });
                    const lines = await res.json();
                    if(Array.isArray(lines)) {
                        rawOcrLines = rawOcrLines.concat(lines);
                    }
                } catch (err) {
                    console.error("OCR Error:", err);
                }
            }

            btn.innerText = "🔍 กำลังประมวลผลการเช็กชื่อ...";
            performMatching();
            renderUI();
            
            btn.disabled = false;
            btn.innerText = "เริ่มการตรวจเช็ก";
        }

        // 3. Logic การเปรียบเทียบข้อมูล (Matching Engine)
        function performMatching() {
            Object.keys(pobData).forEach(group => {
                pobData[group].forEach(person => {
                    person.present = false; // reset
                    
                    for(let line of rawOcrLines) {
                        // ด่าน 1: เจอเลขห้อง+เตียง เป๊ะๆ (เช่น 422A)
                        if(line.includes(person.fullId)) {
                            person.present = true;
                            person.confidence = 100;
                            break;
                        }
                        // ด่าน 2: เจอเลขห้อง และ ชื่อบางส่วน (Fuzzy Match)
                        const namePart = person.name.substring(0, 6);
                        if(line.includes(person.roomOnly) && line.includes(namePart)) {
                            person.present = true;
                            person.confidence = 90;
                            break;
                        }
                    }
                });
            });
        }

        // 4. แสดงผล (UI Rendering)
        function renderUI() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('resultContainer').classList.remove('hidden');
            
            const totalInExcel = pobData.crew.length + pobData.catering.length + pobData.passenger.length;
            let foundCount = 0;

            // Update Statistics
            ["crew", "catering", "passenger"].forEach(key => {
                const found = pobData[key].filter(p => p.present).length;
                const total = pobData[key].length;
                foundCount += found;
                document.getElementById(`count-${key}`).innerText = `${found} / ${total}`;
            });

            // Update Accuracy Status
            const accuracy = ((foundCount / totalInExcel) * 100).toFixed(0);
            const statusAlert = document.getElementById('statusAlert');
            statusAlert.classList.remove('hidden');
            
            if(accuracy < 80) {
                statusAlert.className = "p-4 rounded-2xl text-center font-bold text-sm bg-red-900/30 text-red-400 border border-red-700";
                statusAlert.innerText = `⚠️ ความแม่นยำต่ำ (${accuracy}%): กรุณาตรวจสอบว่าถ่ายรูปชัดหรือแสงพอหรือไม่`;
            } else {
                statusAlert.className = "p-4 rounded-2xl text-center font-bold text-sm bg-green-900/30 text-green-400 border border-green-700";
                statusAlert.innerText = `✅ ตรวจเช็กสำเร็จ! ความแม่นยำ AI ประมาณ ${accuracy}%`;
            }

            // Build List
            let listHtml = "";
            ["crew", "catering", "passenger"].forEach(group => {
                listHtml += `<div class="bg-slate-700/50 p-2 text-[10px] font-black text-slate-400 uppercase tracking-widest mt-4">${group}</div>`;
                pobData[group].forEach(p => {
                    listHtml += `
                        <div class="flex items-center justify-between p-3 rounded-xl ${p.present ? 'bg-green-500/10 text-green-200' : 'bg-red-500/10 text-red-300'}">
                            <div class="flex items-center space-x-3">
                                <span class="text-xs font-mono font-bold bg-slate-900 px-2 py-1 rounded border border-slate-700">${p.fullId}</span>
                                <span class="text-sm font-medium">${p.name}</span>
                            </div>
                            <span class="text-lg">${p.present ? '✅' : '❌'}</span>
                        </div>
                    `;
                });
            });
            document.getElementById('resultList').innerHTML = listHtml;
            document.getElementById('totalSummary').innerText = `มาแล้ว ${foundCount} จาก ${totalInExcel}`;
        }
    </script>
</body>
</html>
