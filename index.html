<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POB Checker - Kamala Thanee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-5">
    <div class="max-w-xl mx-auto bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">🚢 POB Board Checker</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">1. ไฟล์ POB Excel</label>
                <input type="file" id="excelFile" accept=".xlsx" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">2. รูปบอร์ด (เลือกได้หลายรูป)</label>
                <input type="file" id="imageFiles" accept="image/*" multiple class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-600 file:text-white hover:file:bg-green-700">
            </div>

            <button onclick="processData()" id="btn" class="w-full bg-blue-500 py-3 rounded-xl font-bold text-lg hover:bg-blue-400 transition-all shadow-lg active:scale-95">วิเคราะห์ข้อมูลทั้งหมด</button>
        </div>

        <div id="status" class="mt-4 text-center text-sm text-blue-300"></div>
        <div id="result" class="mt-6 space-y-2"></div>
    </div>

    <script>
        let pobList = [];

        document.getElementById('excelFile').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, {range: 6});
                pobList = rows.map(r => String(r['NAME'] || '').toUpperCase().trim()).filter(n => n && n !== 'BARGE CREW');
                document.getElementById('status').innerText = `โหลดรายชื่อสำเร็จ: ${pobList.length} คน`;
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        };

        async function processData() {
            const files = document.getElementById('imageFiles').files;
            const btn = document.getElementById('btn');
            const resultDiv = document.getElementById('result');

            if (files.length === 0 || pobList.length === 0) return alert('กรุณาเลือกไฟล์ Excel และรูปภาพก่อน');

            btn.disabled = true;
            btn.innerText = 'Gemini กำลังอ่านรูป...';
            resultDiv.innerHTML = '';

            const formData = new FormData();
            // วนลูปเอาทุกไฟล์ที่เลือก ใส่ลงใน FormData
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]); 
            }
            formData.append('excel_names', JSON.stringify(pobList));

            try {
                const response = await fetch('/api/read-image', { method: 'POST', body: formData });
                const detected = await response.json();
                const detectedNames = detected.map(d => d.name);

                let html = `<div class="bg-slate-700 p-4 rounded-xl font-bold text-center">ตรวจพบ ${detectedNames.length} คน</div>`;
                pobList.forEach(name => {
                    const isFound = detectedNames.includes(name);
                    html += `
                        <div class="flex justify-between items-center p-3 rounded-lg ${isFound ? 'bg-green-900/30 border border-green-700' : 'bg-red-900/30 border border-red-700'}">
                            <span>${name}</span>
                            <span class="font-bold text-lg">${isFound ? '✅' : '❌'}</span>
                        </div>`;
                });
                resultDiv.innerHTML = html;
            } catch (error) {
                alert('เกิดข้อผิดพลาด: ' + error);
            } finally {
                btn.disabled = false;
                btn.innerText = 'วิเคราะห์ข้อมูลทั้งหมด';
            }
        }
    </script>
</body>
</html>
