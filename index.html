<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>POB Checker - Kamala Thanee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">
<div class="max-w-4xl mx-auto space-y-4">

    <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 text-center">
        <h1 class="text-3xl font-black text-blue-400">🚢 POB MUSTER CHECKER</h1>
        <p class="text-slate-400 text-sm mt-1">Kamala Thanee · 180 คน · Gemini 2.0 Flash</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="p-5 bg-slate-800 rounded-2xl border border-slate-700">
            <label class="block mb-2 font-bold text-blue-300 uppercase text-xs">1. ไฟล์รายชื่อ (Excel)</label>
            <input type="file" id="excelInput" accept=".xlsx" class="w-full text-sm">
            <div id="excelInfo" class="mt-2 text-xs text-blue-400"></div>
        </div>
        <div class="p-5 bg-slate-800 rounded-2xl border border-slate-700">
            <label class="block mb-2 font-bold text-green-300 uppercase text-xs">2. รูปบอร์ด (เลือกหลายรูปได้)</label>
            <input type="file" id="imageInput" accept="image/*" multiple class="w-full text-sm">
        </div>
    </div>

    <button onclick="processImages()" id="mainBtn"
        class="w-full py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">
        เริ่มการตรวจเช็ก
    </button>

    <div id="dashboard" class="hidden space-y-3">
        <div class="grid grid-cols-3 gap-3 font-bold text-center">
            <div class="bg-slate-800 p-4 rounded-xl border-b-4 border-blue-500">
                <div class="text-[10px] text-slate-400 mb-1">MARINE CREW</div>
                <div id="c-marine" class="text-xl">0/0</div>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border-b-4 border-purple-500">
                <div class="text-[10px] text-slate-400 mb-1">CATERING CREW</div>
                <div id="c-catering" class="text-xl">0/0</div>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border-b-4 border-orange-500">
                <div class="text-[10px] text-slate-400 mb-1">PASSENGER</div>
                <div id="c-pax" class="text-xl">0/0</div>
            </div>
        </div>
        <div class="bg-slate-800 p-3 rounded-xl text-sm font-bold text-center" id="totalSummary"></div>
    </div>

    <div id="debugBox" class="hidden bg-slate-800 p-4 rounded-xl border border-yellow-700">
        <div class="flex justify-between items-center mb-2">
            <span class="font-bold text-yellow-400 text-xs">🔍 Raw OCR จาก AI (debug)</span>
            <span id="ocrCount" class="text-xs text-slate-400"></span>
        </div>
        <pre id="debugText" class="text-slate-300 whitespace-pre-wrap text-[11px] max-h-48 overflow-y-auto"></pre>
    </div>

    <div id="results" class="space-y-1"></div>
</div>

<script>
let pobData = { marine: [], catering: [], passenger: [] };
let ocrResults = [];

// ===================== LOAD EXCEL =====================
document.getElementById('excelInput').onchange = async (e) => {
    const buf = await e.target.files[0].arrayBuffer();
    const wb = XLSX.read(buf);
    const ws = wb.Sheets['POB'];
    if (!ws) return alert('ไม่พบ Sheet ชื่อ "POB"');

    const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
    pobData = { marine: [], catering: [], passenger: [] };

    for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        const colA = String(row[0] || '').trim();
        const colB = String(row[1] || '').trim();   // Cabin No.
        const colC = String(row[2] || '').trim();   // Bed
        const colD = String(row[3] || '').trim().toUpperCase(); // Name
        const colG = String(row[6] || '').trim().toUpperCase(); // Department

        // หยุดเมื่อเจอ HOT BED หรือ SUMMARY
        if (colD.includes('HOT BED') || colD.includes('ONE DAY') || colA === 'SUMMARY') break;

        // ต้องมี No. เป็นตัวเลข, Cabin, Bed, Name
        if (!/^\d+$/.test(colA)) continue;
        if (!colB || !colC || !colD) continue;
        if (['NAME', 'BARGE CREW', 'CATERING', 'PASSENGER', 'SECTION'].includes(colD)) continue;

        const cabinId  = colB.toUpperCase().replace(/\s/g, '');
        const bed      = colC.toUpperCase();
        const cabinBed = cabinId + bed;

        // แยกประเภทด้วย Column G (Department)
        let sec;
        if (colG === 'MARINE CREW')   sec = 'marine';
        else if (colG === 'CATERING CREW') sec = 'catering';
        else                               sec = 'passenger';

        pobData[sec].push({ cabin: cabinId, bed, cabinBed, name: colD, status: false, matchedBy: '' });
    }

    const t = pobData.marine.length + pobData.catering.length + pobData.passenger.length;
    document.getElementById('excelInfo').innerText =
        `✅ Marine: ${pobData.marine.length} | Catering: ${pobData.catering.length} | Passenger: ${pobData.passenger.length} | รวม ${t} คน`;
};

// ===================== SCAN IMAGES =====================
async function processImages() {
    const files = document.getElementById('imageInput').files;
    if (!files.length) return alert('กรุณาเลือกรูปภาพ');
    const total = pobData.marine.length + pobData.catering.length + pobData.passenger.length;
    if (!total) return alert('กรุณาโหลดไฟล์ Excel ก่อน');

    const btn = document.getElementById('mainBtn');
    btn.disabled = true;
    ocrResults = [];
    let allRaw = [];

    for (let i = 0; i < files.length; i++) {
        btn.innerText = `⏳ AI สแกนรูปที่ ${i + 1}/${files.length}...`;
        const fd = new FormData();
        fd.append('files', files[i]);
        try {
            const res = await fetch('/api/read-image', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.error) {
                allRaw.push(`❌ รูปที่ ${i+1} ERROR: ${data.error}`);
            } else {
                if (data.parsed) ocrResults = ocrResults.concat(data.parsed);
                if (data.raw) allRaw.push(`--- รูปที่ ${i+1} (${data.parsed?.length || 0} tags) ---\n${data.raw}`);
            }
        } catch (err) {
            allRaw.push(`❌ รูปที่ ${i+1} FETCH ERROR: ${err}`);
        }
    }

    document.getElementById('debugBox').classList.remove('hidden');
    document.getElementById('ocrCount').innerText = `อ่านได้ ${ocrResults.length} tags`;
    document.getElementById('debugText').textContent = allRaw.join('\n\n');

    matchAndShow();
    btn.disabled = false;
    btn.innerText = 'เริ่มการตรวจเช็กอีกครั้ง';
}

// ===================== MATCHING =====================
function matchAndShow() {
    // สร้าง Set ของ cabinBed ที่ AI อ่านได้จากรูป เช่น "B-401A"
    const ocrSet = new Set();
    for (const ocr of ocrResults) {
        if (ocr.cabin_bed) ocrSet.add(ocr.cabin_bed.toUpperCase().replace(/\s/g, ''));
        if (ocr.cabin && ocr.bed) ocrSet.add((ocr.cabin + ocr.bed).toUpperCase().replace(/\s/g, ''));
    }

    Object.keys(pobData).forEach(sec => {
        pobData[sec].forEach(p => {
            p.status = false;
            p.matchedBy = '';
            const key = p.cabinBed.toUpperCase().replace(/\s/g, '');
            if (ocrSet.has(key)) {
                p.status = true;
                p.matchedBy = p.cabinBed;
            }
        });
    });

    renderUI();
}

// ===================== RENDER =====================
function renderUI() {
    document.getElementById('dashboard').classList.remove('hidden');

    const mOK  = pobData.marine.filter(x => x.status).length;
    const cOK  = pobData.catering.filter(x => x.status).length;
    const pOK  = pobData.passenger.filter(x => x.status).length;
    const tOK  = mOK + cOK + pOK;
    const tAll = pobData.marine.length + pobData.catering.length + pobData.passenger.length;

    document.getElementById('c-marine').innerText   = `${mOK}/${pobData.marine.length}`;
    document.getElementById('c-catering').innerText = `${cOK}/${pobData.catering.length}`;
    document.getElementById('c-pax').innerText      = `${pOK}/${pobData.passenger.length}`;
    document.getElementById('totalSummary').innerHTML =
        `รวม: <span class="text-green-400">${tOK}</span>/${tAll} คน &nbsp;|&nbsp; ขาด: <span class="text-red-400">${tAll - tOK}</span> คน`;

    const sections = [
        { key: 'marine',    label: 'MARINE CREW' },
        { key: 'catering',  label: 'CATERING CREW' },
        { key: 'passenger', label: 'PASSENGER / OPERATION' }
    ];

    let html = '';
    sections.forEach(({ key, label }) => {
        const absent  = pobData[key].filter(x => !x.status);
        const present = pobData[key].filter(x => x.status);

        html += `<div class="text-[11px] text-slate-400 font-bold mt-5 mb-2 uppercase px-1">
            ${label} — ✅ ${present.length} &nbsp; ❌ ขาด ${absent.length}
        </div>`;

        [...absent, ...present].forEach(p => {
            const cls = p.status
                ? 'bg-green-500/10 border-green-500/30 text-green-300'
                : 'bg-red-500/10 border-red-500/30 text-red-300';
            html += `
            <div class="flex justify-between items-center p-3 rounded-xl border ${cls} mb-1">
                <span class="text-sm"><b>${p.cabinBed}</b> &nbsp;${p.name}</span>
                <span>${p.status ? '✅' : '❌'}</span>
            </div>`;
        });
    });

    document.getElementById('results').innerHTML = html;
}
</script>
</body>
</html>
