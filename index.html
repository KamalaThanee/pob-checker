<script>
    let pobList = [];
    let allDetectedNames = new Set();

    document.getElementById('excelFile').onchange = function(e) {
        const reader = new FileReader();
        const statusEl = document.getElementById('excelStatus');
        statusEl.innerText = "กำลังคำนวณ POB จาก 3 กลุ่ม...";
        
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets['POB']; 
                const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
                
                let tempNames = [];
                // เริ่มอ่านตั้งแต่แถวที่ 9 เป็นต้นไป
                for(let i = 8; i < rows.length; i++) {
                    let row = rows[i];
                    if(!row || row.length < 4) continue;
                    
                    // รายชื่อคนอยู่คอลัมน์ D (Index 3)
                    let name = String(row[3] || "").trim().toUpperCase();
                    
                    // เงื่อนไขการกรอง:
                    // 1. ต้องไม่ใช่ค่าว่าง
                    // 2. ไม่ใช่หัวข้อกลุ่ม (Barge crew, Catering, PASSENGER)
                    // 3. ไม่ใช่คำว่า NAME
                    // 4. ความยาวต้องมากกว่า 5 ตัวอักษร (กันพวกเลขหรือสัญลักษณ์)
                    const excludeList = ["BARGE CREW", "CATERING", "PASSENGER", "NAME", "POSITION"];
                    
                    if (name.length > 5 && !excludeList.includes(name)) {
                        tempNames.push(name);
                    }
                }

                pobList = [...new Set(tempNames)]; // ลบชื่อซ้ำถ้ามี
                
                if(pobList.length > 0) {
                    statusEl.className = "mt-2 text-xs text-green-400 font-bold";
                    statusEl.innerText = `✅ ตรวจพบรายชื่อ POB ทั้งหมด: ${pobList.length} คน`;
                    allDetectedNames.clear();
                    updateDisplay();
                } else {
                    statusEl.innerText = "❌ ไม่พบรายชื่อในหน้า POB คอลัมน์ D";
                }
            } catch (err) {
                statusEl.innerText = "❌ เกิดข้อผิดพลาดในการเข้าถึงหน้า POB";
            }
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    };

    async function processData() {
        const files = document.getElementById('imageFiles').files;
        const btn = document.getElementById('btn');
        if (pobList.length === 0 || files.length === 0) return alert('โปรดโหลด Excel และเลือกรูปบอร์ดก่อน');

        btn.disabled = true;
        // ไม่ล้าง allDetectedNames เพื่อให้สะสมชื่อจากหลายรูปได้
        
        for (let i = 0; i < files.length; i++) {
            btn.innerText = `กำลังสแกนบอร์ด รูปที่ ${i+1}/${files.length}...`;
            const formData = new FormData();
            formData.append('files', files[i]);
            formData.append('excel_names', JSON.stringify(pobList));

            try {
                const res = await fetch('/api/read-image', { method: 'POST', body: formData });
                const data = await res.json();
                if (Array.isArray(data)) {
                    data.forEach(d => {
                        // เก็บชื่อที่ AI อ่านได้
                        allDetectedNames.add(String(d.name).toUpperCase().trim());
                    });
                }
                updateDisplay();
            } catch (err) {
                console.error("Error reading image:", err);
            }
        }
        btn.disabled = false;
        btn.innerText = 'วิเคราะห์ข้อมูลทั้งหมด';
    }

    function updateDisplay() {
        const resultDiv = document.getElementById('result');
        const detectedArray = Array.from(allDetectedNames);
        
        let foundCount = 0;
        let html = `<div class="bg-blue-600 p-3 rounded-t-xl font-bold text-center" id="summaryCount">กำลังคำนวณ...</div>`;
        html += `<div class="bg-slate-700/30 p-2 max-h-96 overflow-y-auto rounded-b-xl border border-slate-600">`;
        
        pobList.forEach(name => {
            // เช็คว่าชื่อใน Excel มีอยู่ในชื่อที่ AI อ่านได้หรือไม่
            const isFound = detectedArray.some(d => d.includes(name) || name.includes(d));
            if(isFound) foundCount++;
            
            html += `
                <div class="flex justify-between items-center p-2 mb-1 rounded-lg ${isFound ? 'bg-green-900/40 text-green-200' : 'bg-red-900/40 text-red-200'}">
                    <span class="text-xs">${name}</span>
                    <span class="font-bold">${isFound ? '✅' : '❌'}</span>
                </div>`;
        });
        html += `</div>`;
        resultDiv.innerHTML = html;
        document.getElementById('summaryCount').innerText = `เช็กชื่อแล้ว: เจอ ${foundCount} / ทั้งหมด ${pobList.length} คน`;
    }
</script>
