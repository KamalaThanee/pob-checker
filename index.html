<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>POB Checker 180 - Kamala Thanee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <div class="max-w-4xl mx-auto space-y-4">
        <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 text-center">
            <h1 class="text-3xl font-black text-blue-400">🚢 POB MUSTER CHECKER</h1>
            <p class="text-slate-400">เวอร์ชันยอดเป๊ะ 180 คน + AI 2.0 Flash</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="p-5 bg-slate-800 rounded-2xl border border-slate-700">
                <label class="block mb-2 font-bold text-blue-300 uppercase text-xs">1. ไฟล์รายชื่อ (Excel)</label>
                <input type="file" id="excelInput" accept=".xlsx" class="w-full text-sm">
                <div id="excelInfo" class="mt-2 text-xs text-blue-500"></div>
            </div>
            <div class="p-5 bg-slate-800 rounded-2xl border border-slate-700">
                <label class="block mb-2 font-bold text-green-300 uppercase text-xs">2. รูปบอร์ด (เลือกหลายรูปได้)</label>
                <input type="file" id="imageInput" accept="image/*" multiple class="w-full text-sm">
            </div>
        </div>

        <button onclick="processImages()" id="mainBtn" class="w-full py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">
            เริ่มการตรวจเช็ก
        </button>

        <div id="dashboard" class="hidden grid grid-cols-3 gap-3 font-bold text-center">
            <div class="bg-slate-800 p-4 rounded-xl border-b-4 border-blue-500"><div class="text-[10px] text-slate-400">CREW</div><div id="c-crew">0/0</div></div>
            <div class="bg-slate-800 p-4 rounded-xl border-b-4 border-purple-500"><div class="text-[10px] text-slate-400">CATERING</div><div id="c-cat">0/0</div></div>
            <div class="bg-slate-800 p-4 rounded-xl border-b-4 border-orange-500"><div class="text-[10px] text-slate-400">PASSENGER</div><div id="c-pax">0/0</div></div>
        </div>

        <div id="results" class="space-y-1"></div>
    </div>

    <script>
        let pobData = { crew: [], catering: [], passenger: [] };
        let ocrResults = [];

        // --- Logic Excel ตัวที่เคยได้ 180 คนเป๊ะ ---
        document.getElementById('excelInput').onchange = async (e) => {
            const data = await e.target.files[0].arrayBuffer();
            const workbook = XLSX.read(data);
            const sheet = workbook.Sheets['POB'];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            pobData = { crew: [], catering: [], passenger: [] };
            let currentSection = "";

            rows.forEach(row => {
                const colA = String(row[0] || "").trim(); // No.
                const colB = String(row[1] || "").trim(); // Cabin
                const colC = String(row[2] || "").trim(); // Bed
                const colD = String(row[3] || "").trim().toUpperCase(); // Name

                // สัญญาณหยุด (SUMMARY)
                if (colD.includes("SUMMARY") || colA.includes("SUMMARY")) {
                    currentSection = "STOP"; 
                    return;
                }
                if (currentSection === "STOP") return;

                // แยก Section
                if (colD.includes("BARGE CREW")) currentSection = "crew";
                else if (colD.includes("CATERING")) currentSection = "catering";
                else if (colD.includes("PASSENGER") || colD.includes("OPERATION")) currentSection = "passenger";

                // กฎเหล็ก: ต้องมี No เป็นตัวเลข และมี Cabin, Bed, Name ครบ
                const isNumber = !isNaN(parseInt(colA)) && /^\d+$/.test(colA);
                if (isNumber && colB && colC && colD && colD !== "NAME") {
                    pobData[currentSection].push({
                        id: (colB + colC).replace(/\s/g, "").toUpperCase(), // เช่น 422A
                        name: colD,
                        status: false
                    });
                }
            });
            const total = pobData.crew.length + pobData.catering.length + pobData.passenger.length;
            document.getElementById('excelInfo').innerText = `✅ โหลดสำเร็จ: ${total} คน`;
            alert(`นับได้ ${total} คน ตรงตามเป้าหมายครับ!`);
        };

        // --- Logic อ่านรูป: วนลูปทีละรูปป้องกันค้าง ---
        async function processImages() {
            const files = document.getElementById('imageInput').files;
            if (files.length === 0) return alert("กรุณาเลือกรูปภาพ");
            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            ocrResults = [];

            for (let i = 0; i < files.length; i++) {
                btn.innerText = `⏳ AI กำลังสแกนรูปที่ ${i + 1}/${files.length}...`;
                const fd = new FormData();
                fd.append('files', files[i]);
                try {
                    const res = await fetch('/api/read-image', { method: 'POST', body: fd });
                    const lines = await res.json();
                    ocrResults = ocrResults.concat(lines);
                } catch (err) { console.error(err); }
            }

            matchAndShow();
            btn.disabled = false;
            btn.innerText = "เริ่มการตรวจเช็ก";
        }

        function matchAndShow() {
            Object.keys(pobData).forEach(sec => {
                pobData[sec].forEach(p => {
                    p.status = false;
                    const firstName = p.name.split(" ")[0]; // เอาชื่อจริงคำแรก
                    for (let line of ocrResults) {
                        // เช็กทั้ง ID ห้อง (422A) หรือ ชื่อคน
                        if (line.includes(p.id) || (line.includes(firstName) && firstName.length > 3)) {
                            p.status = true;
                            break;
                        }
                    }
                });
            });

            // แสดงผล UI
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('c-crew').innerText = `${pobData.crew.filter(x=>x.status).length}/${pobData.crew.length}`;
            document.getElementById('c-cat').innerText = `${pobData.catering.filter(x=>x.status).length}/${pobData.catering.length}`;
            document.getElementById('c-pax').innerText = `${pobData.passenger.filter(x=>x.status).length}/${pobData.passenger.length}`;

            let html = "";
            ["crew", "catering", "passenger"].forEach(sec => {
                html += `<div class="text-[10px] text-slate-500 font-bold mt-4 uppercase px-2">${sec}</div>`;
                pobData[sec].forEach(p => {
                    html += `
                        <div class="flex justify-between p-3 rounded-xl border ${p.status ? 'bg-green-500/10 border-green-500/30 text-green-300' : 'bg-red-500/10 border-red-500/30 text-red-300'}">
                            <span class="text-sm"><b>${p.id}</b> ${p.name}</span>
                            <span>${p.status ? '✅' : '❌'}</span>
                        </div>
                    `;
                });
            });
            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
