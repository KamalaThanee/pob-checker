<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POB Checker - Kamala Thanee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-5">
    <div class="max-w-xl mx-auto bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">🚢 POB Board Checker</h1>
        
        <div class="space-y-4">
            <div class="bg-slate-700/50 p-4 rounded-xl border border-slate-600">
                <label class="block text-sm font-medium mb-2 text-blue-300">1. ไฟล์ POB Excel (หน้ารวม)</label>
                <input type="file" id="excelFile" accept=".xlsx" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
                <p id="excelStatus" class="mt-2 text-xs text-gray-400 italic">ยังไม่ได้โหลดไฟล์...</p>
            </div>

            <div class="bg-slate-700/50 p-4 rounded-xl border border-slate-600">
                <label class="block text-sm font-medium mb-2 text-green-300">2. รูปบอร์ด Muster (เลือกหลายรูปได้)</label>
                <input type="file" id="imageFiles" accept="image/*" multiple class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-600 file:text-white hover:file:bg-green-700 cursor-pointer">
            </div>

            <button onclick="processData()" id="btn" class="w-full bg-blue-500 py-4 rounded-xl font-bold text-lg hover:bg-blue-400 transition-all shadow-lg active:scale-95">วิเคราะห์ข้อมูลทั้งหมด</button>
        </div>

        <div id="result" class="mt-6 space-y-2"></div>
    </div>

    <script>
        let pobList = [];
        let allDetectedNames = new Set();

        document.getElementById('excelFile').onchange = function(e) {
            const reader = new FileReader();
            const statusEl = document.getElementById('excelStatus');
            statusEl.innerText = "กำลังอ่านข้อมูล...";
            
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets['POB']; 
                    if(!sheet) {
                        statusEl.innerText = "❌ ไม่พบหน้าชื่อ 'POB' ในไฟล์ Excel";
                        return;
                    }
                    const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
                    
                    let tempNames = [];
                    // รายชื่อเริ่มแถวที่ 9 (index 8) ในคอลัมน์ D (index 3)
                    for(let i = 8; i < rows.length; i++) {
                        let row = rows[i];
                        if(!row) continue;
                        let name = String(row[3] || "").trim().toUpperCase();
                        
                        // กรองหัวข้อและค่าว่าง
                        const exclude = ["", "NAME", "BARGE CREW", "CATERING", "PASSENGER", "POSITION"];
                        if (name.length > 5 && !exclude.includes(name)) {
                            tempNames.push(name);
                        }
                    }

                    pobList = [...new Set(tempNames)];
                    statusEl.className = "mt-2 text-xs text-green-400 font-bold";
                    statusEl.innerText = `✅ ตรวจพบรายชื่อ POB: ${pobList.length} คน`;
                    updateDisplay();
                } catch (err) {
                    statusEl.innerText = "❌ อ่านไฟล์ไม่ได้";
                }
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        };

        async function processData() {
            const files = document.getElementById('imageFiles').files;
            const btn = document.getElementById('btn');
            if (pobList.length === 0 || files.length === 0) return alert('โปรดเลือกไฟล์ให้ครบ');

            btn.disabled = true;
            btn.innerText = 'กำลังประมวลผล...';
            
            for (let i = 0; i < files.length; i++) {
                btn.innerText = `อ่านรูปที่ ${i+1}/${files.length}...`;
                const formData = new FormData();
                formData.append('files', files[i]);
                formData.append('excel_names', JSON.stringify(pobList));

                try {
                    const res = await fetch('/api/read-image', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (Array.isArray(data)) {
                        data.forEach(d => allDetectedNames.add(String(d.name).toUpperCase().trim()));
                    }
                    updateDisplay();
                } catch (err) { console.error(err); }
            }
            btn.disabled = false;
            btn.innerText = 'วิเคราะห์ข้อมูลทั้งหมด';
        }

        function updateDisplay() {
            const resultDiv = document.getElementById('result');
            const detectedArray = Array.from(allDetectedNames);
            let foundCount = 0;
            
            let listHtml = "";
            pobList.forEach(name => {
                const isFound = detectedArray.some(d => d.includes(name) || name.includes(d));
                if(isFound) foundCount++;
                listHtml += `
                    <div class="flex justify-between items-center p-2 mb-1 rounded-lg ${isFound ? 'bg-green-900/40 text-green-200' : 'bg-red-900/40 text-red-200'}">
                        <span class="text-xs">${name}</span>
                        <span class="font-bold">${isFound ? '✅' : '❌'}</span>
                    </div>`;
            });

            resultDiv.innerHTML = `
                <div class="bg-blue-600 p-3 rounded-t-xl font-bold text-center">
                    มาแล้ว ${foundCount} / ทั้งหมด ${pobList.length} คน
                </div>
                <div class="bg-slate-700/30 p-2 max-h-96 overflow-y-auto rounded-b-xl border border-slate-600">
                    ${listHtml}
                </div>`;
        }
    </script>
</body>
</html>
