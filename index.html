<script>
        let pobList = [];
        let allDetectedNames = new Set(); // ใช้ Set เพื่อเก็บรายชื่อสะสมจากทุกรูป

        // แก้ไขเฉพาะในส่วน <script> ของ index.html นะครับ
document.getElementById('excelFile').onchange = function(e) {
    const reader = new FileReader();
    const statusEl = document.getElementById('excelStatus');
    statusEl.innerText = "กำลังประมวลผล Excel...";
    
    reader.onload = function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            
            // อ่านทุกแถวโดยไม่ข้าม (range: 0) เพื่อหาตำแหน่งรายชื่อที่แท้จริง
            const rows = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
            
            let extractedNames = [];
            
            // วนลูปหาชื่อ: ปกติจะอยู่คอลัมน์ที่ 3 หรือ 4 (Index 2 หรือ 3)
            rows.forEach((row, index) => {
                if (index < 6) return; // ข้าม Header 6 แถวแรก
                
                // ลองดึงจากคอลัมน์ที่มีข้อมูลยาวๆ (ซึ่งมักจะเป็นชื่อ-นามสกุล)
                let name = row[3] || row[2] || row[4] || "";
                name = String(name).toUpperCase().trim();
                
                // กรองเอาเฉพาะรายชื่อจริง (ไม่ใช่หัวข้อ หรือคำว่า BARGE CREW)
                if (name.length > 5 && name !== "NAME" && name !== "BARGE CREW") {
                    extractedNames.add ? extractedNames.add(name) : extractedNames.push(name);
                }
            });

            // ลบชื่อซ้ำ
            pobList = [...new Set(extractedNames)];

            if(pobList.length > 0) {
                statusEl.className = "mt-2 text-xs text-green-400 font-bold";
                statusEl.innerText = `✅ โหลดรายชื่อสำเร็จ: ${pobList.length} คน (POB ครบถ้วน)`;
            } else {
                statusEl.innerText = "❌ ไม่พบรายชื่อในคอลัมน์ NAME";
            }
        } catch (err) {
            statusEl.innerText = "❌ อ่านไฟล์ไม่ได้ โปรดลองใหม่";
        }
    };
    reader.readAsArrayBuffer(e.target.files[0]);
};

        async function processData() {
            const files = document.getElementById('imageFiles').files;
            const btn = document.getElementById('btn');
            const resultDiv = document.getElementById('result');

            if (pobList.length === 0) return alert('โปรดเลือกไฟล์ Excel ก่อน');
            if (files.length === 0) return alert('โปรดเลือกรูปภาพ');

            btn.disabled = true;
            allDetectedNames.clear(); // ล้างค่าเก่าก่อนเริ่มใหม่
            
            // วนลูปส่งทีละรูป เพื่อไม่ให้ไฟล์ใหญ่เกิน (Vercel limit 4.5MB)
            for (let i = 0; i < files.length; i++) {
                btn.innerText = `กำลังอ่านรูปที่ ${i+1}/${files.length}...`;
                
                const formData = new FormData();
                formData.append('files', files[i]); // ส่งทีละไฟล์ไปที่ API เดิม (ที่รับ List)
                formData.append('excel_names', JSON.stringify(pobList));

                try {
                    const response = await fetch('/api/read-image', { method: 'POST', body: formData });
                    const detected = await response.json();
                    if (Array.isArray(detected)) {
                        detected.forEach(d => allDetectedNames.add(String(d.name).toUpperCase().trim()));
                    }
                    updateDisplay(); // อัปเดตหน้าจอทันทีที่อ่านเสร็จแต่ละรูป
                } catch (error) {
                    console.error(`Errorรูปที่ ${i+1}:`, error);
                }
            }

            btn.disabled = false;
            btn.innerText = 'วิเคราะห์ข้อมูลทั้งหมด';
        }

        function updateDisplay() {
            const resultDiv = document.getElementById('result');
            const detectedArray = Array.from(allDetectedNames);
            
            let html = `<div class="bg-blue-600 p-3 rounded-t-xl font-bold text-center">ตรวจเจอแล้ว ${detectedArray.length} รายการ</div>`;
            html += `<div class="bg-slate-700/30 p-2 max-h-96 overflow-y-auto rounded-b-xl border border-slate-600">`;
            
            pobList.forEach(name => {
                const isFound = detectedArray.some(d => d.includes(name) || name.includes(d));
                html += `
                    <div class="flex justify-between items-center p-2 mb-1 rounded-lg ${isFound ? 'bg-green-900/40 text-green-200' : 'bg-red-900/40 text-red-200'}">
                        <span class="text-xs">${name}</span>
                        <span class="font-bold">${isFound ? '✅' : '❌'}</span>
                    </div>`;
            });
            html += `</div>`;
            resultDiv.innerHTML = html;
        }
    </script>
