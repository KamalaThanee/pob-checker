<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POB Checker - Kamala Thanee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-5">
    <div class="max-w-xl mx-auto bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">🚢 POB Board Checker</h1>
        
        <div class="space-y-4">
            <div class="bg-slate-700/50 p-4 rounded-xl border border-slate-600">
                <label class="block text-sm font-medium mb-2 text-blue-300">1. ไฟล์ POB Excel</label>
                <input type="file" id="excelFile" accept=".xlsx" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
                <p id="excelStatus" class="mt-2 text-xs text-gray-400 italic">ยังไม่ได้โหลดไฟล์...</p>
            </div>

            <div class="bg-slate-700/50 p-4 rounded-xl border border-slate-600">
                <label class="block text-sm font-medium mb-2 text-green-300">2. รูปบอร์ด (เลือกหลายรูปได้)</label>
                <input type="file" id="imageFiles" accept="image/*" multiple class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-600 file:text-white hover:file:bg-green-700 cursor-pointer">
            </div>

            <button onclick="processData()" id="btn" class="w-full bg-blue-500 py-4 rounded-xl font-bold text-lg hover:bg-blue-400 transition-all shadow-lg active:scale-95 disabled:bg-gray-600 disabled:cursor-not-allowed">วิเคราะห์ข้อมูลทั้งหมด</button>
        </div>

        <div id="result" class="mt-6 space-y-2"></div>
    </div>

    <script>
        let pobList = [];

        document.getElementById('excelFile').onchange = function(e) {
            const reader = new FileReader();
            const statusEl = document.getElementById('excelStatus');
            statusEl.innerText = "กำลังอ่านไฟล์...";
            
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    // อ่านข้อมูลทั้งหมดออกมาดู
                    const rows = XLSX.utils.sheet_to_json(sheet, {defval: ""});
                    
                    // ค้นหารายชื่อ: พยายามหาคอลัมน์ที่มีคำว่า NAME หรือลองดึงจากคอลัมน์ที่ 3-4 ถ้าหาไม่เจอ
                    pobList = rows.map(r => {
                        const val = r['NAME'] || r['Name'] || r['name'] || Object.values(r)[3] || ""; 
                        return String(val).toUpperCase().trim();
                    }).filter(n => n && n !== 'BARGE CREW' && n !== 'NAME' && n.length > 2);

                    if(pobList.length > 0) {
                        statusEl.className = "mt-2 text-xs text-green-400 font-bold";
                        statusEl.innerText = `✅ โหลดรายชื่อสำเร็จ: ${pobList.length} คน`;
                    } else {
                        statusEl.className = "mt-2 text-xs text-red-400 font-bold";
                        statusEl.innerText = "❌ หาชื่อในไฟล์ไม่เจอ โปรดเช็กหัวตาราง";
                    }
                } catch (err) {
                    statusEl.innerText = "❌ เกิดข้อผิดพลาดในการอ่านไฟล์";
                }
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        };

        async function processData() {
            const files = document.getElementById('imageFiles').files;
            const btn = document.getElementById('btn');
            const resultDiv = document.getElementById('result');

            if (pobList.length === 0) return alert('ระบบยังไม่มีรายชื่อจาก Excel! โปรดเช็กไฟล์ Excel อีกครั้ง');
            if (files.length === 0) return alert('กรุณาเลือกรูปภาพบอร์ดด้วยครับ');

            btn.disabled = true;
            btn.innerText = 'Gemini กำลังประมวลผล...';
            resultDiv.innerHTML = '<div class="text-center animate-pulse">รอสักครู่... กำลังอ่านรูปภาพทั้งหมด</div>';

            const formData = new FormData();
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]); 
            }
            formData.append('excel_names', JSON.stringify(pobList));

            try {
                const response = await fetch('/api/read-image', { method: 'POST', body: formData });
                const detected = await response.json();
                const detectedNames = (detected || []).map(d => String(d.name).toUpperCase().trim());

                let html = `<div class="bg-blue-600 p-3 rounded-t-xl font-bold text-center">ตรวจพบแล้ว ${detectedNames.length} รายการ</div>`;
                html += `<div class="bg-slate-700/30 p-2 max-h-96 overflow-y-auto rounded-b-xl border border-slate-600">`;
                
                pobList.forEach(name => {
                    const isFound = detectedNames.some(d => d.includes(name) || name.includes(d));
                    html += `
                        <div class="flex justify-between items-center p-2 mb-1 rounded-lg ${isFound ? 'bg-green-900/40 text-green-200' : 'bg-red-900/40 text-red-200'}">
                            <span class="text-sm">${name}</span>
                            <span class="font-bold">${isFound ? '✅' : '❌'}</span>
                        </div>`;
                });
                html += `</div>`;
                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = `<div class="text-red-400 p-4">เกิดข้อผิดพลาด: ${error}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = 'วิเคราะห์ข้อมูลทั้งหมด';
            }
        }
    </script>
</body>
</html>
